{% extends 'base.html' %}
{% block content %}
<h2 data-i18n="admin_products">Admin Product Management</h2>

<section class="card">
  <h3 data-i18n="add_product">Add Product</h3>
  <form method="post" class="form-grid three-col">
    <input type="text" name="name" required placeholder="Product Name">
    <input type="number" step="0.01" name="price" min="0.01" required placeholder="Price">
    <input type="number" name="stock" min="0" required placeholder="Stock">
    <button type="submit" data-i18n="add_product">Add Product</button>
  </form>
</section>

<section class="card">
  <h3 data-i18n="manage_products">Manage Products</h3>
  <table>
    <thead>
      <tr>
        <th data-i18n="product">Product</th>
        <th data-i18n="price">Price</th>
        <th data-i18n="stock">Stock</th>
        <th data-i18n="actions">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for product in products %}
        <tr>
          <td>{{ product.name }}</td>
          <td>
            <form method="post" action="{{ url_for('update_price', product_id=product.id) }}" class="row gap-sm">
              <input type="number" step="0.01" name="price" value="{{ '%.2f'|format(product.price) }}" min="0.01" required>
              <button type="submit" data-i18n="update_price">Update Price</button>
            </form>
          </td>
          <td>{{ product.stock }}</td>
          <td>
            <form method="post" action="{{ url_for('delete_product', product_id=product.id) }}">
              <button type="submit" class="danger" data-i18n="delete_product">Delete Product</button>
            </form>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
